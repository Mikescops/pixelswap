{{- $dest := .Destination | safeURL -}}
{{- $target := "" -}}
{{- $rel := "" -}}
{{- if strings.HasPrefix $dest "http" -}}
    {{- $target = "_blank" -}}
    {{- $rel = "noopener noreferrer" -}}
{{- end -}}
<a
    href="{{ $dest }}"
    {{ with .Title }}
        title="{{ . }}"
    {{ else }}
        title="{{ .Text | safeHTML }}"
    {{ end }}
    {{- if $target }} target="{{ $target }}"{{ end -}}
    {{- if $rel }} rel="{{ $rel }}"{{ end -}}
>
    {{- .Text | safeHTML -}}
</a>
