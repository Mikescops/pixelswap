baseURL = 'https://pixelswap.fr/'
title = 'PixelSwap | Blog by Corentin'
defaultContentLanguage = 'en'
languageCode = 'en-us'
theme = "pixelswap-theme"
author = 'Corentin Mors'
enableGitInfo = true

ignoreFiles = ['README.md', 'LICENSE']
staticDir = ['static']

summaryLength = 30
enableEmoji = true
enableRobotsTXT = true

# Explicit single-language site. For full Hugo multilingual URLs, add `index.fr.md` leaf files
# and a `[languages.fr]` block; use `post_lang` + `alternates` in front matter until then.
[languages.en]
languageCode = 'en-us'
languageName = 'English'
weight = 1
title = 'PixelSwap | Blog by Corentin'

[languages.en.params]
description = "Developer blog by Corentin Mors (France): software engineering, security, infrastructure, and side projects — in English and French."
social_image = "img/logoss.png"
twitter_site = "@mikescops"

[languages.en.params.seo]
default_og_locale = "en_US"
french_og_locale = "fr_FR"
geo_region = "FR"
geo_placename = "France"
geo_position = "47.0;2.0"
icbm = "47.0, 2.0"
llms_txt = "/llms.txt"
llms_full_txt = "/llms-full.txt"

[languages.en.params.seo.llm]
tagline = "Bilingual developer blog by Corentin Mors — software, security, infrastructure, and creation."
topics = "software engineering, web development, cybersecurity, DevOps, Hugo, Node.js, passkeys, infrastructure, France, English, French"

[languages.en.params.author]
name = "Corentin Mors"
url = "https://me.pixelswap.fr/"
job_title = "Co-founder & CTO"
works_for = "Subnoto"
works_for_url = "https://subnoto.com"
nationality = "FR"
home_country = "France"
same_as = [
  "https://dev.pixelswap.fr/",
  "https://me.pixelswap.fr/",
  "https://www.threads.net/@corentin.mrs",
  "https://bsky.app/profile/corentin.mors.dev",
  "https://www.linkedin.com/in/corentinmors/",
]

[languages.en.params.contact]
email = 'medias@pixelswap.fr'

[outputs]
home = ['html', 'rss']
section = ['html', 'rss']
taxonomy = ['html']
term = ['html']

[permalinks]
  [permalinks.page]
    posts = '/entry/:slug/'
  [permalinks.section]
    posts = '/entries/'

[markup]
  [markup.goldmark.renderer]
    unsafe = true

  [markup.highlight]
    anchorLineNos = true
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    hl_inline = false
    lineAnchors = ''
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = false
    noClasses = false
    noHl = false
    tabWidth = 4

[related]
  includeNewer = true
  includeOlder = true
  threshold = 20
  toLower = true

  [[related.indices]]
    name = "tags"
    weight = 100

  [[related.indices]]
    name = "date"
    weight = 10
